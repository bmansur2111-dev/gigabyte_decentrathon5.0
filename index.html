<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGABYTE // Decentrathon 5.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">GIGABYTE <span class="dot">.</span></div>
        
        <nav class="nav-links">
            <a href="#" onclick="showPage('bakalavriat')">Бакалавриат</a>
            <a href="#" onclick="showPage('about')">О нас</a>
            <a href="#" onclick="showPage('contacts')">Контакты</a>
        </nav>
        
        <div class="lang-panel">
            <span class="lang-btn" onclick="changeLang('en')">EN</span>
            <span class="lang-btn" onclick="changeLang('kz')">KZ</span>
            <span class="lang-btn active" onclick="changeLang('ru')">RU</span>
        </div>
    </header>

    <main class="hero">
        <div class="hero-card">
            <h1 id="hero-title">Будущее технологий вместе с GIGABYTE</h1>
            <p id="hero-desc">Разрабатываем инновации на стыке AI и робототехники для Decentrathon 5.0</p>
            <button class="main-button" id="apply-btn">Подать заявку</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
